    <title>만든 사람들</title>
    <style>
      @font-face {
        font-family: "HoppeUI";
        src: url("./assets/fonts/one-mobile-pop.woff") format("woff");
      }
      :root {
        --ui: "HoppeUI", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        box-sizing: border-box;
        padding: 22px 26px;
        font-family: var(--ui);
        color: #2b2f36;
        background: #f7f8fa;
        display: flex;
        flex-direction: column;
      }
      h1 {
        font-size: 19px;
        font-weight: 400;
        margin: 0 0 16px;
        text-align: center;
      }
      .rows {
        display: flex;
        flex-direction: column;
        gap: 13px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .role {
        width: 70px;
        flex: none;
        font-size: 12px;
        color: #8a9099;
      }
      .name {
        flex: 1;
        font-size: 16px;
        font-weight: 400;
      }
      .ic {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
      }
      .ic:hover {
        background: #e9edf2;
      }
      .ic.disabled {
        opacity: 0.3;
        cursor: default;
      }
      .ic.disabled:hover {
        background: transparent;
      }
      .ic svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .divider {
        height: 1px;
        background: #e2e6eb;
        margin: 18px 0 14px;
      }
      .contact {
        font-size: 13px;
        color: #5a616b;
        text-align: center;
      }
      .contact b {
        color: #5865f2;
        font-weight: 400;
      }
      .contact .dc {
        width: 15px;
        height: 15px;
        vertical-align: -2px;
        margin-right: 3px;
      }
      .feedback {
        display: flex;
      }
      .fb {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 11px;
        background: #eef1f5;
        color: #2b2f36;
        font-size: 15px;
        text-decoration: none;
      }
      .fb:hover {
        background: #e3e8f0;
      }
      .fb .arr {
        color: #8a9099;
      }
      .disclaimer {
        margin-top: 16px;
        font-size: 11px;
        line-height: 1.45;
        color: #a7adb5;
        text-align: center;
      }
    </style>
  </head>
