<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; font-src 'self';" />
    <title>만든 사람들</title>
    <style>
      @font-face {
        font-family: "HoppeUI";
        src: url("./assets/fonts/one-mobile-pop.woff") format("woff");
      }
      @font-face {
        font-family: "HoppeJP";
        src: url("./assets/fonts/mochiy-pop-one.ttf") format("truetype");
      }
      :root {
        --ui: "HoppeUI", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      }
      html[lang="ja"] {
        --ui: "HoppeJP", "Yu Gothic", "Hiragino Sans", system-ui, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        box-sizing: border-box;
        padding: 22px 26px;
        font-family: var(--ui);
        color: #2b2f36;
        background: #f7f8fa;
        display: flex;
        flex-direction: column;
      }
      h1 {
        font-size: 19px;
        font-weight: 400;
        margin: 0 0 16px;
        text-align: center;
      }
      .rows {
        display: flex;
        flex-direction: column;
        gap: 13px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .role {
        width: 70px;
        flex: none;
        font-size: 12px;
        color: #8a9099;
      }
      .name {
        flex: 1;
        font-size: 16px;
        font-weight: 400;
      }
      .ic {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
      }
      .ic:hover {
        background: #e9edf2;
      }
      .ic.disabled {
        opacity: 0.3;
        cursor: default;
      }
      .ic.disabled:hover {
        background: transparent;
      }
      .ic svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .divider {
        height: 1px;
        background: #e2e6eb;
        margin: 18px 0 14px;
      }
      .feedback {
        display: flex;
      }
      .fb {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 11px;
        background: #eef1f5;
        color: #2b2f36;
        font-size: 15px;
        text-decoration: none;
      }
      .fb:hover {
        background: #e3e8f0;
      }
      .fb .arr {
        color: #8a9099;
      }
      .disclaimer {
        margin-top: 16px;
        font-size: 11px;
        line-height: 1.45;
        color: #a7adb5;
        text-align: center;
        white-space: pre-line;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="credits">만든 사람들</h1>
    <div class="rows">
      <div class="row">
        <div class="role" data-i18n="rolePlanDev">기획 · 개발</div>
        <div class="name">외눈맨</div>
        <a class="ic" href="https://www.youtube.com/@oinoon_man" target="_blank" title="YouTube">
          <svg viewBox="0 0 24 24"><rect x="1" y="4.5" width="22" height="15" rx="4.5" fill="#FF0000" /><path d="M10 8.2 L16.2 12 L10 15.8 Z" fill="#fff" /></svg>
        </a>
        <a class="ic" href="https://x.com/oinoon_man" target="_blank" title="X">
          <svg viewBox="0 0 24 24"><path fill="#000" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" /></svg>
        </a>
      </div>
      <div class="row">
        <div class="role" data-i18n="roleGraphic">그래픽</div>
        <div class="name">새틀빔</div>
        <a class="ic" href="https://www.youtube.com/@gumball9362" target="_blank" title="YouTube">
          <svg viewBox="0 0 24 24"><rect x="1" y="4.5" width="22" height="15" rx="4.5" fill="#FF0000" /><path d="M10 8.2 L16.2 12 L10 15.8 Z" fill="#fff" /></svg>
        </a>
        <a class="ic" href="https://x.com/satellitebim" target="_blank" title="X">
          <svg viewBox="0 0 24 24"><path fill="#000" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" /></svg>
        </a>
      </div>
    </div>
    <div class="divider"></div>
    <div class="feedback">
      <a class="fb" href="https://oinoonman.featurebase.app/en?b=6a456d55f82b508cc42f67f7" target="_blank"><span data-i18n="feedback">건의사항 및 버그 제보</span> <span class="arr">›</span></a>
    </div>
    <div class="disclaimer" data-i18n="disclaimer">본 프로젝트는 Trickcal: Revive의 2차 창작 프로젝트로, 공식 가이드라인을 준수합니다.</div>
    <script src="./credits.js"></script>
  </body>
</html>
