<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src 'self' data:; font-src 'self';" />
    <title>Desktop Butter</title>
    <style>
      /* Trickcal-toned UI font. Drop the font file into assets/fonts/ (see the
         README there); until then it falls back to the system Korean font. */
      @font-face {
        /* 원스토어 ONE 모바일POP — 파일을 assets/fonts/one-mobile-pop.* 로 저장 */
        font-family: "HoppeUI";
        src:
          url("./assets/fonts/one-mobile-pop.woff2") format("woff2"),
          url("./assets/fonts/one-mobile-pop.woff") format("woff"),
          url("./assets/fonts/one-mobile-pop.otf") format("opentype"),
          url("./assets/fonts/one-mobile-pop.ttf") format("truetype");
        font-display: swap;
      }
      @font-face {
        /* Mochiy Pop One (SIL OFL) — Japanese pop font, matches the ONE Mobile POP tone */
        font-family: "HoppeJP";
        src: url("./assets/fonts/mochiy-pop-one.ttf") format("truetype");
        font-display: swap;
      }
      :root {
        /* ONE Mobile POP covers Korean + Latin (ko/en). */
        --ui-font: "HoppeUI", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      }
      /* Japanese: renderer.ts sets html[lang="ja"] when the pet's language is JA. */
      html[lang="ja"] {
        --ui-font: "HoppeJP", "Yu Gothic", "Hiragino Sans", system-ui, sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
      }
      /* EVERYTHING the pet window draws lives in this fixed 300×300 box, anchored to the
         window's top-left. Why: a transparent frameless window's CONTENT (viewport) can
         creep larger on fractional-DPI displays even while the OUTER window is held at
         300px — and anything positioned against the viewport (left:50%, bottom:0) then
         drifts with it. That is exactly the reported bug: the pet slid sideways out of
         view while the px-anchored bubble stayed behind, and eventually vanished once its
         50% point left the visible 300px. Because #stage is a fixed-size positioned box,
         its children resolve % / bottom against IT, not the viewport — so no amount of
         viewport growth can move them. */
      #stage {
        position: absolute;
        left: 0;
        top: 0;
        /* --stage-w / --stage-h are pushed in by renderer.js from the shared layout
           constants, so this box can never drift from the real window size. The window is
           taller than the pet (headroom on top for the bubble); the pet sits flush at the
           bottom. The literals are only the pre-script fallback. */
        width: var(--stage-w, 300px);
        height: var(--stage-h, 420px);
        overflow: hidden;
      }
      #pet {
        /* The canvas is sized to the pet (renderer sets width/height) and pinned to the
           bottom-center of the stage, so the feet stay on the floor and the headroom above
           holds the speech bubble. width/height come from the renderer. */
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
      }

      /* --- speech bubble: clean CSS bubble in the bubble.png tone ----------- */
      /* Crisp uniform outline (no raster 9-slice), small triangle tail. Text is
         set via textContent; the tail is drawn with ::before (outline) + ::after
         (fill). Right/bottom anchored so the tail stays over the pet's head. */
      #bubble {
        position: absolute;
        /* Centered over the pet's head so the bubble grows evenly to both sides.
           --bubble-x / --bubble-y are published by the renderer from the head position
           MEASURED on the current motion's art (see applyBubbleAnchor + measureHead), so the
           bubble follows every character and motion instead of a one-size-fits-none constant.
           The fallback below is the old fixed estimate, used only if a clip can't be
           measured. translateX(-50%) centres the body (and its tail) on that point. */
        left: var(--bubble-x, calc(150px + 32px * var(--pscale, 1)));
        bottom: var(--bubble-y, calc(196px * var(--pscale, 1)));
        isolation: isolate;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        min-width: 58px;
        /* No max-width: a line grows the bubble horizontally. Authors insert breaks with
           \n in dialogue.json (see applyBreaks); without one the line just stays wide. */
        padding: 9px 15px;
        background: rgba(252, 253, 255, 0.97);
        border: 2px solid #ccd5de;
        border-radius: 19px;
        color: #4a4038;
        font: 400 15px/1.45 var(--ui-font);
        text-align: center;
        white-space: pre; /* honor authored \n only — no automatic wrapping */
        box-shadow: 0 4px 11px rgba(70, 85, 100, 0.2);
        opacity: 0;
        /* scale(--pscale) shrinks the whole bubble (font + frame) with the pet. Origin is
           the tail (bottom-center, over the head), so it scales toward the head. */
        transform: translateX(-50%) translateY(6px) scale(calc(0.94 * var(--pscale, 1)));
        transform-origin: 50% 120%;
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #bubble::before {
        /* tail outline (behind the body) */
        content: "";
        position: absolute;
        z-index: -1;
        left: 50%;
        margin-left: -9px; /* center the 18px-wide tail under the bubble (over the head) */
        bottom: -12px;
        border-left: 9px solid transparent;
        border-right: 9px solid transparent;
        border-top: 12px solid #ccd5de;
      }
      #bubble::after {
        /* tail fill (over the body edge, hides the seam) */
        content: "";
        position: absolute;
        left: 50%;
        margin-left: -6px; /* center the 12px-wide fill triangle */
        bottom: -7px;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 8px solid rgba(252, 253, 255, 0.97);
      }
      #bubble.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(var(--pscale, 1));
      }

      /* --- 속마음 (inner-thoughts) bubble variant ------------------------------
         Same frame/shape + tail as the normal bubble; only the colors change.
         Trickcal's 속마음 banner is a dark-purple body with a magenta glow that
         blooms from the upper-center out to near-black purple edges, a faint
         lighter rim along the top, and vivid pink-magenta text. Colors below are
         eyedropped from the reference image. Keep the tail colors in sync: the
         outline (::before) matches the border, the fill (::after) matches the
         gradient's darkest (edge) color so the tail blends into the body. */
      #bubble.thought {
        /* magenta glow blooms from the LOWER-center up to dark purple at the top */
        background:
          radial-gradient(135% 165% at 50% 74%, #a53fbb 0%, #7a2a92 30%, #401850 64%, #200c2a 100%);
        border-color: #542562;
        color: #f06fd6;
        text-shadow: 0 1px 3px rgba(18, 6, 26, 0.75);
        box-shadow:
          0 4px 12px rgba(40, 12, 55, 0.5),
          inset 0 -1px 0 rgba(200, 128, 218, 0.4);
      }
      /* thought-bubble tail: two solid circles trailing down toward the pet
         (not a triangle). Solid fill = the bubble's lower-body color. */
      #bubble.thought::before,
      #bubble.thought::after {
        content: "";
        position: absolute;
        border: none;
        border-radius: 50%;
        background: #a53fbb;
        z-index: -1;
      }
      #bubble.thought::after {
        /* larger circle, closer to the body */
        width: 12px;
        height: 12px;
        left: 50%;
        margin-left: -6px;
        bottom: -10px;
      }
      #bubble.thought::before {
        /* smaller circle, trailing further away */
        width: 7px;
        height: 7px;
        left: 50%;
        margin-left: -3.5px;
        bottom: -23px;
      }
    </style>
  </head>
  <body>
    <!-- Fixed 300×300 stage: pins every child to the window's real top-left so a growing
         viewport (fractional-DPI) can't drift the pet away from the bubble. See #stage. -->
    <div id="stage">
      <canvas id="pet"></canvas>
      <div id="bubble"></div>
    </div>
    <script src="./assets/vendor/createjs.min.js"></script>
    <!-- The six Adobe Animate (CreateJS) motion compositions are loaded dynamically by
         renderer.js from the selected character's folder (assets/animate/<dir>/), so the
         window can show Butter or Komi (or a future character) from the same page. -->
    <script src="./renderer.js"></script>
  </body>
</html>
