<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- Notes HTML is fetched by main and injected here; script-src blocks any script
         inside it (belt-and-suspenders with main's sanitize), img allows itch images. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src https: data:; font-src 'self';"
    />
    <title>패치노트</title>
    <style>
      :root {
        --bg: #fbfcff;
        --fg: #3a342e;
        --muted: #8a8580;
        --line: #e7eaf0;
        --accent: #f2c14e;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        font: 14px/1.65 "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      #list {
        width: 190px;
        min-width: 190px;
        border-right: 1px solid var(--line);
        overflow-y: auto;
        padding: 8px;
      }
      #list button {
        display: block;
        width: 100%;
        text-align: left;
        border: none;
        background: none;
        padding: 9px 10px;
        border-radius: 9px;
        cursor: pointer;
        color: var(--fg);
        font: inherit;
      }
      #list button:hover {
        background: #f0f1f5;
      }
      #list button.sel {
        background: var(--accent);
        color: #4a3a10;
        font-weight: 700;
      }
      #list .date {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      #list button.sel .date {
        color: #7a6118;
      }
      #main {
        flex: 1;
        overflow-y: auto;
        padding: 18px 22px;
      }
      #main h1 {
        font-size: 17px;
        margin: 0 0 6px;
      }
      #content img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
      }
      #content p {
        margin: 8px 0;
      }
      #content ul {
        padding-left: 20px;
      }
      a {
        color: #c8912a;
      }
      .status {
        color: var(--muted);
        padding: 22px;
      }
      .foot {
        margin-top: 22px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        font-size: 12.5px;
      }
    </style>
  </head>
  <body>
    <nav id="list"><div class="status" id="list-status">…</div></nav>
    <main id="main"><div class="status">…</div></main>
    <script src="./patchnotes.js"></script>
  </body>
</html>
